<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 미 거시경제 지수 캘린더</title>
    <!-- FullCalendar CDN -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/embed/tailwindcss@3.4.1"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        /* 캘린더 내부 고정 스크롤바 강제 제거 및 반응형 확장 */
        .fc {
            background-color: #1e293b;
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid #334155;
        }
        /* 중요: 모바일 및 PC에서 이벤트 텍스트가 잘리지 않고 아래로 자동 줄바꿈되도록 수정 */
        .fc-event {
            white-space: normal !important;
            overflow: visible !important;
            word-break: break-all;
            margin-top: 2px !important;
            margin-bottom: 2px !important;
            padding: 3px 6px !important;
            font-size: 0.85rem !important;
            border-radius: 4px !important;
            border: none !important;
            cursor: pointer;
        }
        /* 주말 색상 커스텀 */
        .fc-day-sun a { color: #f87171 !important; } /* 일요일 빨간색 */
        .fc-day-sat a { color: #60a5fa !important; } /* 토요일 파란색 */
        
        /* 📱 휴대폰(모바일) 환경 전용 초강력 스타일 보정 */
        @media (max-width: 768px) {
            .fc .fc-toolbar {
                flex-direction: column;
                gap: 0.75rem;
            }
            .fc-toolbar-title {
                font-size: 1.25rem !important;
            }
            /* 모바일에서 날짜 칸이 찌그러지지 않도록 최소 세로 높이 확보 (위아래로 길어짐) */
            .fc .fc-daygrid-day-frame {
                min-height: 95px !important;
            }
            .fc-event {
                font-size: 0.75rem !important;
                padding: 2px 4px !important;
            }
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <!-- 상단 헤더 영역 -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-cyan-400 flex items-center gap-2">
                    📘 실시간 미 거시경제 지수 캘린더
                </h1>
                <p class="text-sm text-slate-400 mt-1">로봇이 매일 자동으로 업데이트하는 나만의 주식 대시보드</p>
            </div>
            
            <!-- 범례 (Legend) -->
            <div class="flex flex-wrap gap-3 bg-slate-800 p-3 rounded-lg border border-slate-700 text-xs md:text-sm">
                <div class="flex items-center gap-1.5">
                    <span class="w-3 h-3 bg-cyan-500 rounded-full"></span><span>경제지수</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-3 h-3 bg-rose-500 rounded-full"></span><span>연준 (FOMC)</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span><span>증시 만기일</span>
                </div>
            </div>
        </div>

        <!-- 📅 달력 컨테이너 (위아래 족쇄를 풀고 height: auto로 유연하게 늘어남) -->
        <div id="calendar" class="shadow-2xl"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                // ⭐ 핵심 설정: 고정 높이를 없애고 달력이 콘텐츠에 맞춰 스스로 길어지게 만듭니다. (내부 막대기 삭제)
                height: 'auto', 
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,dayGridWeek'
                },
                buttonText: {
                    today: '오늘',
                    month: '월별',
                    week: '주별'
                },
                // 로봇이 실시간으로 크롤링해다 바치는 JSON 파일 연동
                events: function(info, successCallback, failureCallback) {
                    fetch('stock_calendar_2026.json')
                        .then(response => response.json())
                        .then(data => {
                            // FullCalendar 규격에 맞게 매핑 및 카테고리별 색상 부여
                            var events = data.map(item => {
                                let bgColor = '#06b6d4'; // 기본 경제지수 (Cyan)
                                if (item.category === 'FED') bgColor = '#f43f5e'; // 연준 (Rose)
                                if (item.category === 'MARKET' && item.title.includes('만기일')) bgColor = '#a855f7'; // 만기일 (Purple)
                                if (item.category === 'MARKET' && item.title.includes('삼성')) bgColor = '#2563eb'; // 삼성전자 (Blue 포인트)
                                
                                return {
                                    id: item.id,
                                    title: item.title,
                                    start: item.start_date,
                                    end: item.end_date,
                                    backgroundColor: bgColor,
                                    extendedProps: {
                                        kst: item.kst_announcement,
                                        desc: item.description
                                    }
                                };
                            });
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error('데이터 로드 실패:', error);
                            failureCallback(error);
                        });
                },
                // 팝업 이벤트 추가: 달력의 일정을 클릭하면 상세 정보를 깔끔하게 보여줍니다.
                eventClick: function(info) {
                    alert(
                        `📢 [상세 일정 정보]\n\n` +
                        `📌 일정: ${info.event.title}\n` +
                        `⏰ 시간(KST): ${info.event.extendedProps.kst || '시간 정보 없음'}\n\n` +
                        `📝 내용 요약:\n${info.event.extendedProps.desc || '상세 설명이 없습니다.'}`
                    );
                }
            });
            
            calendar.render();
        });
    </script>
</body>
</html>
