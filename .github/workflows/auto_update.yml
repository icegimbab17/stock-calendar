name: Daily Stock Calendar Update

on:
  schedule:
    - cron: '0 21 * * *' # 매일 한국 시간 오전 6시 자동 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

# 핵심: 파이썬 로봇이 크롤링한 데이터를 저장소에 쓸 수 있도록 명시적 권한 부여
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: Run Calendar Engine
        run: |
          python update_calendar.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_calendar_2026.json
          # 변경사항이 있을 때만 안전하게 커밋 진행 (Exit Code 128 방지)
          git diff-index --quiet HEAD || git commit -m "🚨 [Auto] 실시간 매크로 및 ADR 일정 동적 반영"
          git push
