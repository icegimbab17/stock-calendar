name: Daily Stock Calendar Update

on:
  schedule:
    # 매일 한국 시간(KST) 새벽 6시 자동 실행 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 내가 원할 때 수동으로도 실행 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬(Python) 환경 설정
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 대기업 실적 및 지수 데이터 자동 갱신 실행
      run: python update_calendar.py

    - name: 변경된 데이터 자동 저장 및 깃허브에 반영
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add stock_calendar_2026.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 로봇이 최신 실적 및 매크로 지수를 반영함" && git push)
